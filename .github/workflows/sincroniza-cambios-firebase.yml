# La app permite hacer cambios a los administradores del cantoral en tiempo real. 
# Para ello, luego es necesario sincronizar los cambios y que lleguen automáticamente al .cho
name: Sincroniza cambios en Firebase con Repositorio

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 */2 * *"   # cada 2 días a las 04:00 de la mañana por si acasito

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: songs-sync
      # No cancelar a mitad: el job escribe ficheros y borra nodos en Firebase.
      # Cancelarlo entre medias podría dejar el estado inconsistente.
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements.txt ]; then
            python -m pip install -r scripts/requirements.txt
          else
            python -m pip install requests python-dotenv rich google-auth
          fi

      # 🔑 Usamos TOKEN (simple y 100% funcionando)
      - name: Dry-run (no escribe ni borra)
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_USE_AUTH_HEADER: "false"   # decorativo; el script decide por TOKEN
        run: python scripts/sincronizaCambiosDeFirebase.py --dry-run

      # Aplica los cambios a los .cho PERO NO borra todavía los nodos de Firebase.
      # Los IDs procesados se guardan en /tmp (fuera del repo) y se borran solo
      # después de un push correcto, para no perder ediciones si el push falla.
      - name: Apply (escribe ficheros; borrado diferido)
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_USE_AUTH_HEADER: "false"
        run: python scripts/sincronizaCambiosDeFirebase.py --defer-deletes /tmp/pending-deletes.json

      - name: Commit & push only if changed
        id: push
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No hay cambios que commitear."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "chore: sync songs from Firebase"
          # Push con rebase + reintentos (backoff 2s,4s,8s,16s) por si la rama se movió.
          n=0
          until [ $n -ge 4 ]; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            n=$((n+1))
            echo "Push falló, reintento $n…"
            sleep $((2 ** n))
          done
          echo "pushed=false" >> "$GITHUB_OUTPUT"
          echo "::error::No se pudo hacer push. NO se borrarán los nodos de Firebase (se reintentará en la próxima ejecución)."
          exit 1

      # Solo ahora, con los cambios ya seguros en el repo, borramos los nodos en Firebase.
      - name: Borrar nodos sincronizados en Firebase (solo tras push correcto)
        if: steps.push.outputs.pushed == 'true'
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_USE_AUTH_HEADER: "false"
        run: python scripts/sincronizaCambiosDeFirebase.py --delete-only /tmp/pending-deletes.json

      # ───────────────────────── OPCIONAL: Service Account ─────────────────────────
      # Para preferir SA en lugar de TOKEN:
      # 1) Crea el secret FIREBASE_SA_JSON con el contenido del JSON
      # 2) Restaura el JSON y LIMPIA el token del entorno
      # 3) Llama al script sin FIREBASE_TOKEN
      #
      # - name: Restore service account & prefer SA
      #   env:
      #     FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SA_JSON }}
      #   run: |
      #     echo "$FIREBASE_SA_JSON" > "$GITHUB_WORKSPACE/sa.json"
      #     echo "GOOGLE_APPLICATION_CREDENTIALS=$GITHUB_WORKSPACE/sa.json" >> $GITHUB_ENV
      #     echo "FIREBASE_TOKEN=" >> $GITHUB_ENV   # ← esto fuerza al script a usar SA
